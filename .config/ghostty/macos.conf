# macOS-only. Loaded from `config`; absent on Linux, where the `?` prefix
# makes the include a no-op.

# 10pt is sized for the Linux display; Retina needs more.
font-size = 14

# The split navigation binds use alt. Without this, Option composes special
# characters instead of sending a modifier and alt+left/right/up/down never
# reach Ghostty.
macos-option-as-alt = true
