# Linux-only. Loaded from `config`; absent on macOS, where the `?` prefix
# makes the include a no-op.

# Omarchy drives the palette; `theme` in the shared config is applied after
# this and wins, as before.
config-file = ?"~/.config/omarchy/current/theme/ghostty.conf"

font-size = 10

gtk-toolbar-style = flat
